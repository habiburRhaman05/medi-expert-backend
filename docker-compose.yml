services:

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro  # ✅ main config এ দাও
    depends_on:
      - backend1
      - backend2
      - backend3
    restart: always

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    restart: always
    volumes:
      - mydb:/var/lib/postgresql/data

  backend1:
    build: .
    env_file:
      - .env
    restart: always
    environment:
      - SERVER_ID=Server-1
      - PORT=5000
    ports:
      - "5001:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist          # ✅ এটা যোগ করো! dist ও আলাদা রাখো
    command: npm run dev
    depends_on:
      - db

  backend2:
    build: .
    env_file:
      - .env
    restart: always
    environment:
      - SERVER_ID=Server-2
      - PORT=5000
    ports:
      - "5002:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist          # ✅ এটা যোগ করো!
    command: npm run dev
    depends_on:
      - db

  backend3:
    build: .
    env_file:
      - .env
    restart: always
    environment:
      - SERVER_ID=Server-3
      - PORT=5000
    ports:
      - "5003:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist          # ✅ এটা যোগ করো!
    command: npm run dev
    depends_on:
      - db

volumes:
  mydb: